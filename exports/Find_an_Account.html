<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Search — Account 360</title>
  <style>
:root {
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  line-height: 1.5;
  color: #111;
  background: #f4f5f7;
}
body { margin: 0; }
.site-header {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 1rem 1.25rem;
  background: #0f172a;
  color: #fff;
}
.brand {
  color: #fff;
  font-weight: 700;
  text-decoration: none;
}
.tag {
  font-size: 0.8rem;
  opacity: 0.85;
  border: 1px solid rgba(255, 255, 255, 0.35);
  padding: 0.1rem 0.45rem;
  border-radius: 999px;
}
.container {
  max-width: 52rem;
  margin: 0 auto;
  padding: 1.5rem 1rem 3rem;
}
.card {
  background: #fff;
  border-radius: 10px;
  padding: 1.25rem 1.5rem;
  margin-bottom: 1rem;
  box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
}
.card h1 { margin-top: 0; }
.muted { color: #64748b; font-size: 0.95rem; }
.search-form {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-top: 1rem;
}
.search-form input[type="search"] {
  flex: 1 1 16rem;
  padding: 0.5rem 0.65rem;
  border: 1px solid #cbd5e1;
  border-radius: 8px;
  font-size: 1rem;
}
.search-form button {
  padding: 0.5rem 1rem;
  border-radius: 8px;
  border: none;
  background: #2563eb;
  color: #fff;
  font-weight: 600;
  cursor: pointer;
}
.search-form button:hover { background: #1d4ed8; }
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  border: 0;
}
  </style>
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/">Account 360</a>
    <span class="tag">Local CSV MVP</span>
  </header>
  <main class="container">
    <section class="card">
      <h1>Find an account</h1>
      <p class="muted">Search by <strong>account name</strong> (partial match) or <strong>Bob company ID</strong> (exact).</p>
      <form class="search-form" method="get" action="/search">
        <label class="sr-only" for="q">Search</label>
        <input id="q" name="q" type="search" placeholder="e.g. Finalto or 303038" value="" autocomplete="off" />
        <button type="submit">Search</button>
      </form>
    </section>
  </main>
</body>
</html>
